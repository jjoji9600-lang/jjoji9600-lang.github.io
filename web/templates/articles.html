{{define "articles.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{{.Title}} - Blog Engine</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo"><h2>Blog Engine</h2></div>
        <nav>
            <a href="/" class="nav-item"><span class="icon">📊</span> 仪表盘</a>
            <a href="/articles" class="nav-item active"><span class="icon">📝</span> 文章管理</a>
            <a href="/articles/new" class="nav-item"><span class="icon">➕</span> 新建文章</a>
            <a href="/publish" class="nav-item"><span class="icon">🚀</span> 发布</a>
            <a href="/settings" class="nav-item"><span class="icon">⚙️</span> 设置</a>
        </nav>
    </div>
    <main class="content">
        <header><h1>{{.Title}}</h1></header>
        <div class="main-content">
            <a href="/articles/new" class="btn btn-primary">➕ 新建文章</a>
            <br><br>
            <table>
                <thead><tr><th>标题</th><th>操作</th></tr></thead>
                <tbody>
                    {{range .Articles}}
                    <tr>
                        <td><a href="/preview/{{.Title}}">{{.Title}}</a></td>
                        <td>
                            <a href="/articles/edit/{{.Title}}" class="btn btn-small">编辑</a>
                            <a href="/articles/delete/{{.Title}}" class="btn btn-small btn-danger" onclick="return confirm('确定删除？')">删除</a>
                        </td>
                    </tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
{{end}}
