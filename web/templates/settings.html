{{define "settings.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{{.Title}} - Blog Engine</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo"><h2>Blog Engine</h2></div>
        <nav>
            <a href="/" class="nav-item"><span class="icon">📊</span> 仪表盘</a>
            <a href="/articles" class="nav-item"><span class="icon">📝</span> 文章管理</a>
            <a href="/articles/new" class="nav-item"><span class="icon">➕</span> 新建文章</a>
            <a href="/publish" class="nav-item"><span class="icon">🚀</span> 发布</a>
            <a href="/settings" class="nav-item active"><span class="icon">⚙️</span> 设置</a>
        </nav>
    </div>
    <main class="content">
        <header><h1>{{.Title}}</h1></header>
        <div class="main-content">
            {{if .Saved}}
            <div class="alert alert-success">设置已保存！</div>
            {{end}}
            <form method="POST">
                <h3>基本设置</h3>
                <div class="form-group">
                    <label>博客标题</label>
                    <input type="text" name="title" value="{{.Config.title}}">
                </div>
                <div class="form-group">
                    <label>博客描述</label>
                    <input type="text" name="description" value="{{.Config.description}}">
                </div>
                <h3>GitHub 设置</h3>
                <div class="form-group">
                    <label>仓库</label>
                    <input type="text" name="github_repo" value="{{.Config.github_repo}}">
                </div>
                <div class="form-group">
                    <label>分支</label>
                    <input type="text" name="github_branch" value="{{.Config.github_branch}}">
                </div>
                <h3>服务器设置</h3>
                <div class="form-group">
                    <label>地址</label>
                    <input type="text" name="server_host" value="{{.Config.server_host}}">
                </div>
                <div class="form-group">
                    <label>路径</label>
                    <input type="text" name="server_path" value="{{.Config.server_path}}">
                </div>
                <button type="submit" class="btn btn-primary">保存设置</button>
            </form>
        </div>
    </main>
</body>
</html>
{{end}}
